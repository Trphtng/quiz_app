<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="login-modal">
        <div class="login-container">
            <div class="login-box">
                <h2>Đăng Nhập</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Tên người dùng</label>
                        <input type="text" id="username" placeholder="Nhập tên người dùng" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="login-btn">Đăng Nhập</button>
                </form>
            </div>
        </div>
    </div>

    <div class="app-container" style="display: none;" id="appContainer">
        <!-- Quiz Box -->
        <div class="quiz-box">
            <header>
                <div class="title">Web Quiz App</div>
                <div class="header-center">
                    <div class="timer">
                        <div class="time-text">Thời gian:</div>
                        <div class="timer-sec">15</div>
                    </div>
                </div>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <button id="logoutBtn" class="logout-btn">Đăng Xuất</button>
                </div>
            </header>
            <section class="quiz-section">
                <div class="question-text">
                    <!-- Text inserted via JS -->
                </div>
                <div class="option-list">
                    <!-- Options inserted via JS -->
                </div>
            </section>
            <footer>
                <div class="total-questions">
                    <!-- Info inserted via JS -->
                </div>
                <button class="next-btn">Câu tiếp theo</button>
            </footer>
        </div>

        <!-- Result Box -->
        <div class="result-box hide">
            <div class="icon">
                🏆
            </div>
            <div class="complete-text">Bạn đã hoàn thành bài kiểm tra!</div>
            <div class="score-text">
                <!-- Score inserted via JS -->
            </div>
            <div class="buttons">
                <button class="restart">Làm lại</button>
                <button class="quit">Thoát</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
